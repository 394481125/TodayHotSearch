name: Build Android APK

on:
  push:
    branches: [ "main", "master" ] # 触发分支，根据你仓库的默认分支调整
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # 允许你在 GitHub Actions 页面手动点击触发构建

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17' # 根据你项目的 Gradle/AGP 版本调整（常用 11 或 17）
          distribution: 'temurin'
          cache: 'gradle' # 开启 Gradle 缓存，大幅提升后续构建速度

      - name: Grant Execute Permission for Gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: TodayHotSearch-Debug-APK
          path: app/build/outputs/apk/debug/*.apk # 如果你的主模块不叫 app，请替换为对应的模块名